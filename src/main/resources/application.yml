server:
  port: 8080

spring:
  application:
    name: context-preservation-system
  
  # 禁用 OpenAI 自动配置
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding-model: tongyi-embedding-vision-plus

milvus:
  host: ${SPRING_AI_MILVUS_HOST:localhost}
  port: ${SPRING_AI_MILVUS_PORT:19530}
  collection:
    name: conversation_chunks
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:/app/data/cpsdb}
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# 阿里云灵积配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  embedding-model: tongyi-embedding-vision-plus

# 上下文保存配置
context:
  preservation:
    threshold: 10000       # Token 阈值（约 200-500 句话，10-20 轮对话）
    summary-model: gpt-4o-mini
    max-history-chunks: 5  # 保留最近 5 个历史片段
  
  retrieval:
    top-k: 5               # 检索结果数量
    score-threshold: 0.7   # 相似度阈值（0-1，越高越严格）

logging:
  level:
    com.example.cps: DEBUG
